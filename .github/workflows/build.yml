name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate icons
        run: |
          pip install pillow
          python make_icon.py

      - name: Build release
        run: cargo build --release

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: fixmyborderpls
          path: target\release\fixmyborderpls.exe

      # If this was triggered by a GitHub release, attach the exe to it
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: target\release\fixmyborderpls.exe
